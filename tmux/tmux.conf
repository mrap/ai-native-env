# .tmux.conf
set -g default-command "${SHELL}"
set -g history-limit 500000


set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg terminal-overrides ",*:RGB"
set -ga allow-passthrough on
set -ga terminal-overrides ',*:allow-passthrough'
set -ga terminal-features 'xterm*:allow-passthrough'
set -g renumber-windows on

# Enable focus hooks
set -g focus-events on

# Ensure panes update their style when focus changes
set-hook -g pane-focus-out 'select-pane -P "fg=#{@thm_surface_2},bg=#{@thm_crust}"'
set-hook -g pane-focus-in  'select-pane -P "fg=#{@thm_text},bg=#{@thm_base}"'

# --- prefix ---
unbind C-b
set -g prefix C-Space
bind Space send-prefix

# Cycle through layouts
bind a next-layout

# Screen like binding for last window
bind C-Space last-window

# New windows/pane in $PWD
bind c new-window -c "#{pane_current_path}"


# --- basics ---
set -g mouse on
set -g escape-time 20

# --- Splits ---
bind-key ^V split-window -h -l 50% -c "#{pane_current_path}"
bind-key ^S split-window -l 50% -c "#{pane_current_path}"

# Use vi keybindings in copy and choice modes
setw -g mode-keys vi
# 'v' enters copy mode
bind v copy-mode

# In copy-mode:
# 'v' begins selection like vim
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi 'Enter' send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# set first window to index 1 (not 0) to map more to the keyboard layout...
set-option -g base-index 1
set-window-option -g pane-base-index 1

# force a reload of the config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Claude Code agent Constellation Bar
set -g status 2
set -g status-format[1] '#(python3 ~/.claude/plugins/cache/claude-templates/tmux-statusline/1.1.0/bin/constellation.py)'
set -g status-interval 2


# --- plugins ---
if-shell -b '[ ! -d "$XDG_CONFIG_HOME"/tmux/plugins/tpm ]' "\
    echo Installing tpm... && \
    mkdir -p $XDG_CONFIG_HOME/tmux/plugins/tpm && \
    git clone https://github.com/tmux-plugins/tpm $XDG_CONFIG_HOME/tmux/plugins/tpm && $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jtbairdsr/tmux-inactive-panes'
set -g @plugin 'tmux-plugins/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'christoomey/vim-tmux-navigator'
run '~/.config/tmux/plugins/tpm/tpm'
