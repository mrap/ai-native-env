# .tmux.conf
# Updated 2026-03-18 — tmux makeover (q-119)
# Backup: tmux.conf.backup-2026-03-18

# ── Terminal & core ──────────────────────────────────────────────────────────
set -g default-command "${SHELL}"
set -g history-limit 500000
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg terminal-overrides ",*:RGB"
set -ga allow-passthrough on
set -ga terminal-overrides ',*:allow-passthrough'
set -ga terminal-features 'xterm*:allow-passthrough'
set -g renumber-windows on
set -g escape-time 20
set -g mouse on
set -g focus-events on

# ── Indices ──────────────────────────────────────────────────────────────────
set-option -g base-index 1
set-window-option -g pane-base-index 1

# ── Prefix (unchanged) ──────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind Space send-prefix

# ── Keybindings (unchanged) ─────────────────────────────────────────────────
bind a next-layout
bind C-Space last-window
bind c new-window -c "#{pane_current_path}"
bind-key ^V split-window -h -l 50% -c "#{pane_current_path}"
bind-key ^S split-window -l 50% -c "#{pane_current_path}"
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ── Copy mode (vi, unchanged) ───────────────────────────────────────────────
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
if-shell "uname | grep -q Darwin" \
  "bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -selection clipboard'"
if-shell "uname | grep -q Darwin" \
  "bind-key -T copy-mode-vi 'Enter' send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi 'Enter' send -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# ── Pane borders + active pane indicator ─────────────────────────────────────
set -g pane-border-lines heavy
set -g pane-border-style "fg=#bcc0cc"
set -g pane-active-border-style "fg=#1e66f5"

# Pane titles in the border — shows pane number + running command
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=#1e66f5 bold],#[fg=#bcc0cc]}#{pane_index}: #{pane_current_command} "

# Focus hooks removed — they override terminal colors and force dark backgrounds.
# Active/inactive pane distinction handled by tmux-inactive-panes plugin (dims inactive)
# and pane border colors (blue active, gray inactive).

# ── Catppuccin theme (must be set BEFORE plugin runs) ────────────────────────
set -g @catppuccin_flavor 'latte'
set -g @catppuccin_window_status_style "rounded"

# ── Status bar ───────────────────────────────────────────────────────────────
# Session name prominent at top-left, date/time on the right
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-right-length 100
set -g status-left-length 100
set -g status-left " #[fg=#1e66f5,bold,bg=default] #S  "
set -g status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_status_date_time_text "%H:%M  %d %b"

# ── Session persistence ─────────────────────────────────────────────────────
# NEW: save sessions across restarts (prefix+S to save, prefix+R to restore)
# Rebind from default Ctrl-s/Ctrl-r to avoid conflict with ^S horizontal split
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'off'

# ── sesh: session switcher (prefix+t to pick, prefix+s to toggle last) ──────
bind-key "t" run-shell "bash ~/.config/tmux/sesh-picker.sh"
bind-key "C-t" run-shell "bash ~/.config/tmux/sesh-picker.sh"
bind-key "s" run-shell "sesh last"

# ── tmux-thumbs: rebind to prefix+F to avoid conflict with send-prefix ──────
set -g @thumbs-key F

# ── TPM bootstrap (unchanged) ───────────────────────────────────────────────
if-shell -b '[ ! -d "$XDG_CONFIG_HOME"/tmux/plugins/tpm ]' "\
    echo Installing tpm... && \
    mkdir -p $XDG_CONFIG_HOME/tmux/plugins/tpm && \
    git clone https://github.com/tmux-plugins/tpm $XDG_CONFIG_HOME/tmux/plugins/tpm && $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/install_plugins'"

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'                    # NEW: theme (fixes @thm_* vars)
set -g @plugin 'tmux-plugins/tmux-resurrect'        # NEW: session save/restore
set -g @plugin 'tmux-plugins/tmux-continuum'        # NEW: auto-save (must be after resurrect)
set -g @plugin 'fcsonline/tmux-thumbs'              # NEW: hint-copy (prefix+F)
set -g @plugin 'jtbairdsr/tmux-inactive-panes'
set -g @plugin 'christoomey/vim-tmux-navigator'     # kept (removed duplicate tmux-plugins/ version)
set -g @plugin 'tmux-plugins/tmux-copycat'
run '~/.config/tmux/plugins/tpm/tpm'
